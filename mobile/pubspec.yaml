name: bonifatus_mobile
description: Bonifatus — Grade rewards tracker for students and parents.
publish_to: 'none'
version: 2.0.2+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^10.3.1

  # Local cache
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # Biometrics
  local_auth: ^3.0.2

  # Google Sign-In
  google_sign_in: ^7.2.0

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.5.0
  google_mlkit_text_recognition: ^0.16.0

  # QR code
  mobile_scanner: ^7.4.0
  qr_flutter: ^4.1.0

  # Charts
  fl_chart: ^1.2.0

  # UI utilities
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Security
  crypto: ^3.0.6

  # Utilities
  intl: ^0.20.2
  json_annotation: ^4.12.0
  equatable: ^2.0.7
  shared_preferences: ^2.3.3
  package_info_plus: ^10.2.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.10+1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  json_serializable: ^6.14.0
  hive_ce_generator: ^1.11.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo-512.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
