name: bonifatus_mobile
description: Bonifatus — Grade rewards tracker for students and parents.
publish_to: 'none'
version: 2.0.2+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # HTTP
  dio: ^5.7.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Local cache
  hive_ce: ^2.9.0
  hive_ce_flutter: ^2.2.0

  # Biometrics
  local_auth: ^2.3.0

  # Camera & image
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # QR code
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  # Charts
  fl_chart: ^0.70.0

  # UI utilities
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Security
  crypto: ^3.0.6

  # Utilities
  intl: ^0.20.2
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  shared_preferences: ^2.3.3
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  hive_ce_generator: ^1.8.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo-512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo-512.png"
  remove_alpha_ios: true
  web:
    generate: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

