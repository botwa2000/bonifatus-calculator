name: Deploy Web — Hetzner Docker Swarm

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - 'mobile/**'
      - 'docs/**'
      - '*.md'

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  deploy:
    name: Deploy to Hetzner (${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }}

    steps:
      - name: Resolve environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          echo "name=$ENV" >> "$GITHUB_OUTPUT"
          if [[ "$ENV" == "prod" ]]; then
            echo "port=3000"             >> "$GITHUB_OUTPUT"
            echo "domain=bonifatus.com"  >> "$GITHUB_OUTPUT"
            echo "image=bonifatus:prod"  >> "$GITHUB_OUTPUT"
            echo "stack=bonifatus-prod"  >> "$GITHUB_OUTPUT"
            echo "repo_dir=/home/deploy/bonifatus-calculator" >> "$GITHUB_OUTPUT"
            echo "app_url=https://bonifatus.com"              >> "$GITHUB_OUTPUT"
            echo "turnstile_key=0x4AAAAAAB7cH7pweCPsYnpL"    >> "$GITHUB_OUTPUT"
          else
            echo "port=3001"                 >> "$GITHUB_OUTPUT"
            echo "domain=dev.bonifatus.com"  >> "$GITHUB_OUTPUT"
            echo "image=bonifatus:dev"       >> "$GITHUB_OUTPUT"
            echo "stack=bonifatus-dev"       >> "$GITHUB_OUTPUT"
            echo "repo_dir=/home/deploy/bonifatus-dev" >> "$GITHUB_OUTPUT"
            echo "app_url=https://dev.bonifatus.com"   >> "$GITHUB_OUTPUT"
            echo "turnstile_key=0x4AAAAAACWJz491rhjNxKNi" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 159.69.180.183
          username: root
          key: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          envs: MOBILE_APP_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -euo pipefail
            ENV="${{ steps.env.outputs.name }}"
            REPO_DIR="${{ steps.env.outputs.repo_dir }}"
            IMAGE_TAG="${{ steps.env.outputs.image }}"
            STACK="${{ steps.env.outputs.stack }}"
            STACK_FILE="docker-stack.${ENV}.yml"
            APP_URL="${{ steps.env.outputs.app_url }}"
            PORT="${{ steps.env.outputs.port }}"
            DOMAIN="${{ steps.env.outputs.domain }}"
            TURNSTILE_KEY="${{ steps.env.outputs.turnstile_key }}"

            MOBILE_APP_SECRET='${{ secrets.MOBILE_APP_SECRET }}'
            GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}'
            GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}'

            [ -n "$MOBILE_APP_SECRET"     ] || { echo "ERROR: MOBILE_APP_SECRET secret is empty";     exit 1; }
            [ -n "$GOOGLE_CLIENT_ID"      ] || { echo "ERROR: GOOGLE_CLIENT_ID secret is empty";      exit 1; }
            [ -n "$GOOGLE_CLIENT_SECRET"  ] || { echo "ERROR: GOOGLE_CLIENT_SECRET secret is empty";  exit 1; }

            echo "=== [0/5] Provision Swarm secrets ==="
            echo "Docker info:" && docker info --format '{{.Swarm.LocalNodeState}}' 2>&1 || true

            SECRET_NAME="${ENV}_MOBILE_APP_SECRET"
            if docker secret inspect "$SECRET_NAME" > /dev/null 2>&1; then
              echo "Docker secret $SECRET_NAME already exists -- skipping"
            else
              echo "Creating Docker secret $SECRET_NAME"
              printf '%s' "$MOBILE_APP_SECRET" | docker secret create "$SECRET_NAME" -
              echo "Created Docker secret $SECRET_NAME"
            fi

            SECRET_NAME="${ENV}_GOOGLE_CLIENT_ID"
            if docker secret inspect "$SECRET_NAME" > /dev/null 2>&1; then
              echo "Docker secret $SECRET_NAME already exists -- skipping"
            else
              echo "Creating Docker secret $SECRET_NAME"
              printf '%s' "$GOOGLE_CLIENT_ID" | docker secret create "$SECRET_NAME" -
              echo "Created Docker secret $SECRET_NAME"
            fi

            SECRET_NAME="${ENV}_GOOGLE_CLIENT_SECRET"
            if docker secret inspect "$SECRET_NAME" > /dev/null 2>&1; then
              echo "Docker secret $SECRET_NAME already exists -- skipping"
            else
              echo "Creating Docker secret $SECRET_NAME"
              printf '%s' "$GOOGLE_CLIENT_SECRET" | docker secret create "$SECRET_NAME" -
              echo "Created Docker secret $SECRET_NAME"
            fi

            echo "=== [1/5] Pull latest ==="
            cd "$REPO_DIR"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            # proxy.ts is the old name for middleware.ts — remove if stale on disk
            rm -f proxy.ts
            git pull origin "${{ github.ref_name }}"
            # Ensure middleware.ts is present (rm -f above used to include it, causing 404
            # when git pull brought in commits that didn't touch middleware.ts)
            git checkout -- middleware.ts 2>/dev/null || true

            echo "=== [1.5/5] Run DB migrations (manual) ==="
            # drizzle-kit is a devDependency not present in the production image.
            # To run a migration: ssh root@159.69.180.183 and exec into the running container:
            #   CONTAINER=$(docker ps --filter name=bonifatus-prod_app --format "{{.ID}}" | head -1)
            #   DB_URL=$(docker exec $CONTAINER cat /run/secrets/prod_DATABASE_URL)
            #   docker exec $CONTAINER node -e "
            #     const {Client}=require('/app/node_modules/pg');
            #     const c=new Client({connectionString:'$DB_URL'});
            #     c.connect().then(()=>c.query('ALTER TABLE ... ADD COLUMN IF NOT EXISTS ...')).then(()=>c.end())
            #   "
            echo "NOTE: Run migrations manually via docker exec if schema changes are pending"

            echo "=== [2/5] Build image ==="
            docker build \
              --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="$TURNSTILE_KEY" \
              --build-arg NEXT_PUBLIC_APP_URL="$APP_URL" \
              --build-arg NEXT_PUBLIC_DEBUG_LEVEL="${{ steps.env.outputs.name == 'prod' && 'none' || 'verbose' }}" \
              -t "$IMAGE_TAG" .

            echo "=== [3/5] Deploy stack ==="
            docker stack deploy -c "$STACK_FILE" "$STACK"

            echo "=== [4/5] Force service update ==="
            docker service update --force --image "$IMAGE_TAG" "${STACK}_app"

            echo "=== [5/5] Health check ==="
            sleep 25
            HEALTH=$(curl -sf "http://localhost:${PORT}/api/health" || echo 'FAIL')
            if echo "$HEALTH" | grep -q '"status":"ok"'; then
              echo "==> $DOMAIN is healthy"
            else
              echo "==> Health check failed: $HEALTH"
              docker service logs "${STACK}_app" --tail 30
              exit 1
            fi
