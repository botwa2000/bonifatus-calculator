name: Flutter — Store Release (manual, Claude-triggered)
# NEVER runs automatically. Claude triggers this via the GitHub API after
# explicit user approval:
#   POST /repos/botwa2000/bonifatus-calculator/actions/workflows/flutter-release.yml/dispatches
#   { "ref": "main", "inputs": { "platform": "both", "track": "internal" } }

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        default: 'both'
        type: choice
        options:
          - android
          - both
          - ios
      track:
        description: 'Android Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    name: Build & publish Flutter Android (${{ inputs.track }} track)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
      - name: Run tests
        working-directory: mobile
        run: flutter test
      - name: Decode keystore
        run: echo "${{ secrets.CM_KEYSTORE }}" | base64 --decode > /tmp/bonifatus-release.keystore
      - name: Create key.properties
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=/tmp/bonifatus-release.keystore\n' \
            '${{ secrets.CM_KEYSTORE_PASSWORD }}' \
            '${{ secrets.CM_KEY_PASSWORD }}' \
            '${{ secrets.CM_KEY_ALIAS }}' \
            > mobile/android/key.properties
      - name: Set build number
        working-directory: mobile
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          CODE=$((1000 + GITHUB_RUN_NUMBER))
          sed -i "s/^version: .*/version: ${CURRENT}+${CODE}/" pubspec.yaml
          echo "version: ${CURRENT}+${CODE}"
      - name: Build AAB
        working-directory: mobile
        run: flutter build appbundle --release
      - name: Build APK
        working-directory: mobile
        run: flutter build apk --release
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: bonifatus-flutter-release.aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bonifatus-flutter-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      - name: Publish to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
          packageName: com.bonifatus.app
          releaseFiles: mobile/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed
          changesNotSentForReview: false

  ios-trigger:
    if: ${{ always() && (inputs.platform == 'ios' || (inputs.platform == 'both' && needs.android.result == 'success')) }}
    name: Trigger Codemagic iOS build
    runs-on: ubuntu-latest
    needs: android
    steps:
      - name: Verify secrets
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CM_APP_ID: ${{ secrets.BONIFATUS_CODEMAGIC_APP_ID }}
        run: |
          [ -n "$CM_TOKEN" ] || { echo "::error::CODEMAGIC_API_TOKEN is empty"; exit 1; }
          [ -n "$CM_APP_ID" ] || { echo "::error::BONIFATUS_CODEMAGIC_APP_ID is empty"; exit 1; }
          echo "Secrets OK (app id length ${#CM_APP_ID})"
      - name: Trigger Codemagic flutter-release
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CM_APP_ID: ${{ secrets.BONIFATUS_CODEMAGIC_APP_ID }}
        run: |
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-auth-token: $CM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"appId\":\"$CM_APP_ID\",\"workflowId\":\"flutter-release\",\"branch\":\"main\"}" \
            https://api.codemagic.io/builds)
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP $code -- $body"
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ] || { echo "::error::Codemagic trigger failed (HTTP $code)"; exit 1; }
          echo "iOS build queued"
