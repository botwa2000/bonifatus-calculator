name: Flutter — Store Release (manual, Claude-triggered)
# NEVER runs automatically. Claude triggers this via the GitHub API
# after explicit user approval:
#   POST /repos/botwa2000/bonifatus-calculator/actions/workflows/flutter-release.yml/dispatches
#   { "ref": "main", "inputs": { "platform": "android", "track": "internal" } }
#
# Flutter source lives in the mobile/ subdirectory (same pattern as lalabuba/flutter_app).
# For iOS: Claude triggers the Codemagic "flutter-release" workflow via
#   POST https://api.codemagic.io/builds
#   { "appId": "<BONIFATUS_CODEMAGIC_APP_ID>", "workflowId": "flutter-release", "branch": "main" }

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to release'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - both
          - ios
      track:
        description: 'Android Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  # ── Android ──────────────────────────────────────────────────────────────────
  android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    name: Build & publish Flutter Android (${{ inputs.track }} track)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Flutter dependencies
        run: cd mobile && flutter pub get

      - name: Run tests
        run: cd mobile && flutter test

      - name: Decode keystore
        run: |
          echo "${{ secrets.CM_KEYSTORE }}" | base64 --decode > /tmp/bonifatus-release.keystore

      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.CM_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.CM_KEY_PASSWORD }}
          keyAlias=${{ secrets.CM_KEY_ALIAS }}
          storeFile=/tmp/bonifatus-release.keystore
          EOF

      - name: Set build number in pubspec.yaml
        run: |
          CURRENT=$(grep '^version:' mobile/pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          CODE=$((1000 + GITHUB_RUN_NUMBER))
          sed -i "s/^version: .*/version: ${CURRENT}+${CODE}/" mobile/pubspec.yaml
          echo "pubspec version → ${CURRENT}+${CODE}"

      - name: Build release App Bundle (AAB)
        run: cd mobile && flutter build appbundle --release

      - name: Build signed release APK (sideload artifact)
        run: cd mobile && flutter build apk --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonifatus-flutter-release.aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bonifatus-flutter-release.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Publish to Play Store (${{ inputs.track }} track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
          packageName: com.bonifatus.app
          releaseFiles: mobile/build/app/outputs/bundle/release/app-release.aab
          tracks: ${{ inputs.track }}
          status: completed
          changesNotSentForReview: false

  # ── iOS: trigger Codemagic flutter-release workflow ───────────────────────────
  ios-trigger:
    if: ${{ always() && (inputs.platform == 'ios' || (inputs.platform == 'both' && needs.android.result == 'success')) }}
    name: Trigger Codemagic Flutter iOS build
    runs-on: ubuntu-latest
    needs: android

    steps:
      - name: Verify Codemagic token is present
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
        run: |
          if [ -z "$CM_TOKEN" ]; then
            echo "::error::CODEMAGIC_API_TOKEN secret is empty/unset"
            exit 1
          fi
          echo "Codemagic token present (length: ${#CM_TOKEN})"

      - name: Trigger Codemagic flutter-release
        env:
          CM_TOKEN: ${{ secrets.CODEMAGIC_API_TOKEN }}
          CERT_KEY: ${{ secrets.CM_CERTIFICATE_PRIVATE_KEY }}
        run: |
          APP_ID="${{ secrets.BONIFATUS_CODEMAGIC_APP_ID }}"
          if [ -z "$APP_ID" ]; then
            echo "::error::BONIFATUS_CODEMAGIC_APP_ID secret is not set."
            exit 1
          fi
          # Pass CM_CERTIFICATE_PRIVATE_KEY at trigger time so Codemagic
          # doesn't need it stored as an app-level variable.
          PAYLOAD=$(jq -n \
            --arg appId "$APP_ID" \
            --arg key "$CERT_KEY" \
            '{appId: $appId, workflowId: "flutter-release", branch: "main",
              environment: {variables: {CM_CERTIFICATE_PRIVATE_KEY: $key}}}')
          resp=$(curl -s -w "\n%{http_code}" -X POST \
            -H "x-auth-token: $CM_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            https://api.codemagic.io/builds)
          code=$(echo "$resp" | tail -n1)
          body=$(echo "$resp" | sed '$d')
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Codemagic build trigger failed (HTTP $code)"
            exit 1
          fi
          echo "Codemagic flutter-release triggered successfully"
